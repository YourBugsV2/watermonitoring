<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>pHMonitor — Communication Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    :root {
      --bg: #f0f9ff; --card: rgba(255,255,255,0.75); --text: #0f172a;
      --text2: #475569; --accent: #0369a1; --accent2: #0ea5e9;
      --border: rgba(255,255,255,0.5); --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --btn: linear-gradient(135deg, #0369a1, #0ea5e9);
      --success: #16a34a; --error: #dc2626; --warning: #d97706;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --card: rgba(30,41,59,0.85); --text: #e2e8f0;
      --text2: #94a3b8; --accent: #38bdf8; --accent2: #7dd3fc;
      --border: rgba(255,255,255,0.1); --shadow: 0 4px 20px rgba(0,0,0,0.3);
      --btn: linear-gradient(135deg, #0369a1, #38bdf8);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Plus Jakarta Sans',sans-serif;
      background:linear-gradient(160deg,var(--bg),#bae6fd);
      color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased;
    }
    [data-theme="dark"] body { background:linear-gradient(160deg,#0f172a,#1e293b,#0c4a6e); }
    .header {
      background:var(--card); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border); padding:1rem 2rem;
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:1rem; position:sticky; top:0; z-index:100;
    }
    .header-left { display:flex; align-items:center; gap:1rem; }
    .back-btn {
      background:rgba(255,255,255,0.2); border:1px solid var(--border);
      border-radius:50%; width:40px; height:40px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; text-decoration:none; color:var(--text); transition:0.3s;
    }
    .back-btn:hover { transform:scale(1.1); }
    .header-title { font-size:1.4rem; font-weight:800; color:var(--accent); }
    .header-right { display:flex; align-items:center; gap:0.8rem; }
    .theme-btn,.logout-btn {
      padding:0.5rem 1.2rem; border-radius:50px; cursor:pointer;
      font-weight:600; font-size:0.85rem; border:1px solid var(--border);
      background:rgba(255,255,255,0.15); color:var(--text);
      font-family:'Plus Jakarta Sans',sans-serif; transition:0.3s;
    }
    .logout-btn { background:rgba(220,38,38,0.1); color:#ef4444; border-color:rgba(220,38,38,0.3); }
    .logout-btn:hover { background:rgba(220,38,38,0.2); }
    .content { max-width:1000px; margin:0 auto; padding:1.5rem 1.5rem 3rem; }
    .card {
      background:var(--card); backdrop-filter:blur(20px);
      border:1px solid var(--border); border-radius:24px;
      padding:1.8rem; margin-bottom:1.5rem; box-shadow:var(--shadow);
    }
    .card-title { font-size:1.2rem; font-weight:700; margin-bottom:1.2rem; }
    .status-row { display:flex; gap:1rem; align-items:center; flex-wrap:wrap; }
    .badge {
      display:inline-block; padding:0.25rem 0.7rem; border-radius:50px;
      font-size:0.7rem; font-weight:700; text-transform:uppercase;
    }
    .badge-ok { background:rgba(34,197,94,0.15); color:var(--success); }
    .badge-err { background:rgba(220,38,38,0.15); color:var(--error); }
    .badge-warn { background:rgba(245,158,11,0.15); color:var(--warning); }
    .btn {
      padding:0.7rem 1.5rem; font-family:'Plus Jakarta Sans',sans-serif;
      font-size:0.9rem; font-weight:700; color:white;
      background:var(--btn); border:none; border-radius:12px;
      cursor:pointer; transition:0.3s; white-space:nowrap;
    }
    .btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(14,165,233,0.3); }
    .btn:disabled { opacity:0.5; cursor:not-allowed; pointer-events:none; }
    .btn-outline { background:transparent; color:var(--accent); border:2px solid var(--accent2); }
    .btn-sm { padding:0.45rem 1rem; font-size:0.78rem; }
    .list-item {
      display:flex; justify-content:space-between; align-items:flex-start;
      flex-wrap:wrap; gap:1rem; padding:1rem;
      background:rgba(255,255,255,0.05); border:1px solid var(--border);
      border-radius:14px; margin-bottom:0.7rem;
    }
    .list-info { flex:1; min-width:200px; }
    .list-info .name { font-weight:700; color:var(--accent); }
    .list-info .email { color:var(--accent2); font-size:0.85rem; word-break:break-all; }
    .list-info .meta { font-size:0.8rem; color:var(--text2); }
    .list-actions { display:flex; gap:0.5rem; flex-wrap:wrap; }
    .log-list { max-height:350px; overflow-y:auto; }
    .log-row {
      display:flex; align-items:center; gap:0.8rem;
      padding:0.6rem 0.8rem; border-bottom:1px solid var(--border); font-size:0.82rem;
    }
    .log-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .log-dot.ok { background:var(--success); }
    .log-dot.fail { background:var(--error); }
    .toast {
      position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%);
      background:var(--card); backdrop-filter:blur(20px);
      border:1px solid var(--border); border-radius:14px;
      padding:0.8rem 1.8rem; font-weight:600; font-size:0.9rem; z-index:9999;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      opacity:0; transform:translateX(-50%) translateY(15px);
      transition:0.3s; pointer-events:none;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .empty { text-align:center; padding:2rem; color:var(--text2); }
    @media(max-width:600px){
      .header{padding:0.8rem 1rem}.header-title{font-size:1.1rem}
      .content{padding:1rem}.card{padding:1.2rem}.list-item{flex-direction:column}
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <a href="admin.html" class="back-btn">←</a>
      <span class="header-title">📧 Communication Center</span>
    </div>
    <div class="header-right">
      <button class="theme-btn" onclick="toggleTheme()">🌓 Theme</button>
      <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
  </header>

  <div class="toast" id="toast"></div>

  <div class="content">
    <div class="card">
      <div class="card-title">⚙️ Email Service</div>
      <div class="status-row">
        <span id="statusBadge"><span class="badge badge-ok">✓ Active</span></span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📋 Pending Complaints</div>
      <div id="pendingList"><div class="empty">Loading...</div></div>
    </div>
    <div class="card">
      <div class="card-title">✅ Approved Complaints</div>
      <div id="approvedList"><div class="empty">Loading...</div></div>
    </div>
    <div class="card">
      <div class="card-title">📜 Email History</div>
      <div class="log-list" id="emailLog"><div class="empty">No emails yet</div></div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwpl69ZjmQvJxk3xmBmFIntVnV9YLIeV2IjYCbTwPu8fgYY5Z1UKO2C-oOcC62OYPGbLQ/exec";

    firebase.initializeApp({
      apiKey: "AIzaSyCB4O8j33O3MvstmRPDxaIRA16hBLEWszA",
      authDomain: "phmonitor-c7b10.firebaseapp.com",
      databaseURL: "https://phmonitor-c7b10-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "phmonitor-c7b10"
    });
    const db = firebase.database();
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
      if (!user || user.email !== 'admin@phmonitor.com') window.location.href = 'login.html';
    });
    function logout() { auth.signOut().then(() => window.location.href = 'login.html'); }

    function toast(msg, d = 3000) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), d);
    }

    // Send email using fetch with no-cors mode - NO POPUP
    async function sendEmail(c) {
      if (!c.email || !c.email.includes('@')) { toast('⚠️ No valid email'); return false; }

      const formData = new URLSearchParams();
      formData.append('to_name', c.name || 'User');
      formData.append('to_email', c.email.trim());
      formData.append('status', c.status || 'reviewed');
      formData.append('issue', c.issue || 'N/A');
      formData.append('location', c.location || 'N/A');
      formData.append('ph', c.ph || 'N/A');
      formData.append('tds', c.tds || 'N/A');

      try {
        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData.toString()
        });
        
        // Since no-cors returns opaque response, assume success if no error
        db.ref('emailLogs').push({
          to: c.email, name: c.name, complaintId: c.id,
          type: c.status, status: 'sent', timestamp: Date.now()
        });
        return true;
      } catch(e) {
        console.error('Email error:', e);
        db.ref('emailLogs').push({
          to: c.email, name: c.name, complaintId: c.id,
          type: c.status, status: 'failed', error: e.message, timestamp: Date.now()
        });
        toast('❌ Failed to send');
        return false;
      }
    }

    async function approveAndEmail(id) {
      const snap = await db.ref('complaints/' + id).once('value');
      const c = snap.val();
      if (!c) return toast('❌ Not found');
      if (!c.email) return toast('⚠️ No email');

      toast('📤 Sending...');
      const ok = await sendEmail({ ...c, id, status: 'approved' });

      if (ok) {
        await db.ref('complaints/' + id).update({
          status: 'approved', emailSent: true, emailSentAt: Date.now(), approvedAt: Date.now()
        });
        toast('✅ Approved & email sent!');
      }
      loadAll(); loadLog();
    }

    async function emailOnly(id) {
      const snap = await db.ref('complaints/' + id).once('value');
      const c = snap.val();
      if (!c || !c.email) return toast('⚠️ No email');
      toast('📤 Sending...');
      await sendEmail({ ...c, id, status: c.status || 'pending' });
      await db.ref('complaints/' + id).update({ emailSent: true, emailSentAt: Date.now() });
      toast('✅ Email sent!');
      loadLog();
    }

    async function resendEmail(id) {
      const snap = await db.ref('complaints/' + id).once('value');
      const c = snap.val();
      if (!c || !c.email) return toast('⚠️ Cannot resend');
      toast('📤 Sending...');
      await sendEmail({ ...c, id, status: 'approved' });
      await db.ref('complaints/' + id).update({ emailSent: true, emailSentAt: Date.now() });
      toast('✅ Re-sent!');
      loadLog();
    }

    function loadAll() {
      db.ref('complaints').orderByChild('status').equalTo('pending').once('value', snap => {
        const data = snap.val();
        const el = document.getElementById('pendingList');
        if (!data) { el.innerHTML = '<div class="empty">🎉 No pending complaints</div>'; return; }
        el.innerHTML = Object.entries(data).map(([k, c]) => {
          const hasEmail = c.email && c.email.includes('@');
          return `<div class="list-item">
            <div class="list-info">
              <div class="name">${c.name||'Unknown'}</div>
              ${hasEmail?`<div class="email">📧 ${c.email}</div>`:'<div style="color:#ef4444;font-size:0.8rem;">⚠ No email</div>'}
              <div class="meta">📍 ${c.location||'-'} | ${c.issue||'-'} | pH:${c.ph||'N/A'}</div>
            </div>
            <div class="list-actions">
              <button class="btn btn-sm" onclick="approveAndEmail('${k}')" ${!hasEmail?'disabled':''}>✓ Approve & Email</button>
              <button class="btn btn-sm btn-outline" onclick="emailOnly('${k}')" ${!hasEmail?'disabled':''}>📧 Email</button>
            </div>
          </div>`;
        }).join('');
      });
      db.ref('complaints').orderByChild('status').equalTo('approved').once('value', snap => {
        const data = snap.val();
        const el = document.getElementById('approvedList');
        if (!data) { el.innerHTML = '<div class="empty">No approved</div>'; return; }
        el.innerHTML = Object.entries(data).map(([k, c]) => {
          const hasEmail = c.email && c.email.includes('@');
          const badge = c.emailSent ? '<span class="badge badge-ok">Emailed</span>' : '<span class="badge badge-warn">Not emailed</span>';
          return `<div class="list-item">
            <div class="list-info"><div class="name">${c.name||'Unknown'}</div>
            ${hasEmail?`<div class="email">📧 ${c.email}</div>`:''}
            <div class="meta">📍 ${c.location||'-'} | ${badge}</div></div>
            <div class="list-actions"><button class="btn btn-sm btn-outline" onclick="resendEmail('${k}')" ${!hasEmail?'disabled':''}>📤 Re-send</button></div>
          </div>`;
        }).join('');
      });
    }

    function loadLog() {
      db.ref('emailLogs').orderByChild('timestamp').limitToLast(50).on('value', snap => {
        const data = snap.val();
        const el = document.getElementById('emailLog');
        if (!data) { el.innerHTML = '<div class="empty">No emails yet</div>'; return; }
        el.innerHTML = Object.values(data).reverse().map(e => {
          const time = new Date(e.timestamp).toLocaleString('en-IN',{timeZone:'Asia/Kolkata'});
          return `<div class="log-row">
            <div class="log-dot ${e.status==='sent'?'ok':'fail'}"></div>
            <span style="flex:1;word-break:break-all;">📧 ${e.to}</span>
            <span style="font-size:0.7rem;color:var(--text2);">${time}</span>
            <span class="badge ${e.status==='sent'?'badge-ok':'badge-err'}">${e.status}</span>
          </div>`;
        }).join('');
      });
    }

    function toggleTheme() {
      const html = document.documentElement;
      if(html.getAttribute('data-theme')==='dark'){
        html.removeAttribute('data-theme'); localStorage.setItem('theme','light');
      } else {
        html.setAttribute('data-theme','dark'); localStorage.setItem('theme','dark');
      }
    }

    window.onload = () => {
      if(localStorage.getItem('theme')==='dark') document.documentElement.setAttribute('data-theme','dark');
      loadAll(); loadLog();
    };
  </script>
</body>
</html>
