<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pHMonitor — Login</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap');

    :root {
      /* Light theme (default) */
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.3);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      --glass-highlight: inset 0 1px 0 0 rgba(255, 255, 255, 0.5);
      --accent-primary: #0369a1;
      --accent-secondary: #0ea5e9;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --bg-start: #f0f9ff;
      --bg-mid: #bae6fd;
      --bg-end: #38bdf8;
      --orb-1: rgba(56, 189, 248, 0.3);
      --orb-2: rgba(14, 165, 233, 0.25);
      --orb-3: rgba(255, 255, 255, 0.4);
      --input-bg: rgba(255, 255, 255, 0.2);
      --input-border: rgba(255, 255, 255, 0.4);
      --input-focus-border: rgba(14, 165, 233, 0.6);
      --input-focus-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
      --button-bg: linear-gradient(135deg, #0369a1, #0ea5e9);
      --button-hover-shadow: 0 10px 30px rgba(14, 165, 233, 0.4);
      --card-bg: rgba(255, 255, 255, 0.15);
      --card-border: rgba(255, 255, 255, 0.3);
      --title-gradient: linear-gradient(135deg, #0c4a6e 0%, #0369a1 40%, #0ea5e9 100%);
      --error-color: #dc2626;
      --error-bg: rgba(220, 38, 38, 0.1);
      --transition-smooth: 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
      --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Dark theme */
    [data-theme="dark"] {
      --glass-bg: rgba(15, 23, 42, 0.3);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      --glass-highlight: inset 0 1px 0 0 rgba(255, 255, 255, 0.08);
      --accent-primary: #38bdf8;
      --accent-secondary: #7dd3fc;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --bg-start: #0f172a;
      --bg-mid: #1e293b;
      --bg-end: #0c4a6e;
      --orb-1: rgba(56, 189, 248, 0.08);
      --orb-2: rgba(14, 165, 233, 0.06);
      --orb-3: rgba(255, 255, 255, 0.03);
      --input-bg: rgba(15, 23, 42, 0.4);
      --input-border: rgba(255, 255, 255, 0.1);
      --input-focus-border: rgba(56, 189, 248, 0.5);
      --input-focus-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
      --button-bg: linear-gradient(135deg, #0369a1, #38bdf8);
      --button-hover-shadow: 0 10px 30px rgba(56, 189, 248, 0.4);
      --card-bg: rgba(15, 23, 42, 0.35);
      --card-border: rgba(255, 255, 255, 0.08);
      --title-gradient: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 40%, #bae6fd 100%);
      --error-color: #fca5a5;
      --error-bg: rgba(220, 38, 38, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-start) 20%, var(--bg-mid) 50%, var(--bg-mid) 80%, var(--bg-end) 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      transition: background 0.5s ease, color 0.5s ease;
    }

    /* Ambient background orbs */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 20s ease-in-out infinite;
      transition: background 0.5s ease;
    }
    .bg-orb--1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--orb-1), transparent);
      top: -20%;
      right: -10%;
      animation-delay: 0s;
    }
    .bg-orb--2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--orb-2), transparent);
      bottom: -15%;
      left: -10%;
      animation-delay: -7s;
    }
    .bg-orb--3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, var(--orb-3), transparent);
      top: 40%;
      left: 60%;
      animation-delay: -14s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -20px) scale(1.05); }
      50% { transform: translate(-15px, 15px) scale(0.95); }
      75% { transform: translate(-25px, -15px) scale(1.02); }
    }

    /* Theme toggle button */
    .theme-toggle {
      position: fixed;
      top: 2rem;
      right: 2rem;
      z-index: 1000;
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      width: 52px;
      height: 52px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      box-shadow: var(--glass-shadow), var(--glass-highlight);
      transition: all var(--transition-smooth);
      outline: none;
      color: var(--text-primary);
    }

    .theme-toggle:hover {
      transform: scale(1.1) rotate(15deg);
      box-shadow: 0 12px 40px 0 rgba(14, 165, 233, 0.3), var(--glass-highlight);
      border-color: rgba(255, 255, 255, 0.7);
    }

    .theme-toggle:active {
      transform: scale(0.95) rotate(0deg);
      transition: transform 0.1s ease;
    }

    .theme-toggle .icon-sun,
    .theme-toggle .icon-moon {
      transition: all 0.3s ease;
      position: absolute;
    }

    .theme-toggle .icon-sun {
      opacity: 0;
      transform: scale(0) rotate(-90deg);
    }

    .theme-toggle .icon-moon {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    [data-theme="dark"] .theme-toggle .icon-sun {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    [data-theme="dark"] .theme-toggle .icon-moon {
      opacity: 0;
      transform: scale(0) rotate(90deg);
    }

    /* Back button */
    .back-btn {
      position: fixed;
      top: 2rem;
      left: 2rem;
      z-index: 1000;
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      width: 52px;
      height: 52px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      box-shadow: var(--glass-shadow), var(--glass-highlight);
      transition: all var(--transition-smooth);
      outline: none;
      color: var(--text-primary);
      text-decoration: none;
    }

    .back-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 40px 0 rgba(14, 165, 233, 0.3), var(--glass-highlight);
      border-color: rgba(255, 255, 255, 0.7);
    }

    /* Login container */
    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 1rem;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      padding: 3rem 2.5rem;
      box-shadow: var(--glass-shadow), var(--glass-highlight);
      transition: all var(--transition-smooth);
    }

    .login-card:hover {
      box-shadow: 0 16px 48px 0 rgba(14, 165, 233, 0.2), var(--glass-highlight);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .login-logo {
      font-size: 3rem;
      margin-bottom: 1rem;
      filter: drop-shadow(0 4px 8px rgba(14, 165, 233, 0.3));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .login-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      background: var(--title-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: all 0.5s ease;
    }

    .login-subtitle {
      font-size: 0.95rem;
      color: var(--text-secondary);
      font-weight: 400;
      transition: color 0.5s ease;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      letter-spacing: 0.02em;
      transition: color 0.5s ease;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      opacity: 0.6;
      transition: opacity 0.3s ease;
    }

    .form-input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 3rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-primary);
      background: var(--input-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--input-border);
      border-radius: 16px;
      outline: none;
      transition: all var(--transition-smooth);
      letter-spacing: 0.01em;
    }

    .form-input::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
      font-weight: 400;
    }

    .form-input:focus {
      border-color: var(--input-focus-border);
      box-shadow: var(--input-focus-shadow), var(--glass-highlight);
      background: rgba(255, 255, 255, 0.25);
    }

    .form-input:focus + .input-icon,
    .form-input:focus ~ .input-icon {
      opacity: 1;
    }

    .login-btn {
      width: 100%;
      padding: 1rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      background: var(--button-bg);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: all var(--transition-bounce);
      box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
      margin-top: 1rem;
      position: relative;
      overflow: hidden;
    }

    .login-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.3) 50%,
        transparent 100%
      );
      transition: left 0.7s ease;
    }

    .login-btn:hover {
      transform: translateY(-3px);
      box-shadow: var(--button-hover-shadow);
    }

    .login-btn:hover::after {
      left: 100%;
    }

    .login-btn:active {
      transform: translateY(-1px) scale(0.98);
      transition: transform 0.1s ease;
    }

    .error-msg {
      margin-top: 1.2rem;
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--error-color);
      background: var(--error-bg);
      border: 1px solid rgba(220, 38, 38, 0.2);
      text-align: center;
      display: none;
      animation: shake 0.5s ease;
    }

    .error-msg.show {
      display: block;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-4px); }
    }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      transition: color 0.5s ease;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .theme-toggle {
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        font-size: 1.1rem;
      }
      .back-btn {
        top: 1rem;
        left: 1rem;
        width: 40px;
        height: 40px;
        font-size: 1.1rem;
      }
      .login-card {
        padding: 2rem 1.5rem;
        border-radius: 24px;
      }
      .login-title {
        font-size: 1.6rem;
      }
      .login-subtitle {
        font-size: 0.85rem;
      }
      .form-input {
        padding: 0.8rem 0.8rem 0.8rem 2.5rem;
        font-size: 0.9rem;
      }
      .login-btn {
        padding: 0.85rem;
        font-size: 0.95rem;
      }
    }

    @media (max-width: 380px) {
      .login-container {
        padding: 0.5rem;
      }
      .login-card {
        padding: 1.5rem 1.2rem;
      }
      .login-title {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <!-- Ambient background elements -->
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-orb bg-orb--3"></div>

  <!-- Back button -->
  <a href="index.html" class="back-btn" aria-label="Go back">←</a>

  <!-- Theme Toggle Button -->
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span class="icon-sun">☀️</span>
    <span class="icon-moon">🌙</span>
  </button>

  <!-- Login Container -->
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">💧</div>
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Sign in to pHMonitor</p>
      </div>

      <form onsubmit="event.preventDefault(); login();">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input 
              type="email" 
              id="email" 
              class="form-input" 
              placeholder="Enter your email" 
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="Enter your password" 
              required
            >
          </div>
        </div>

        <button type="submit" class="login-btn">Sign In</button>
      </form>

      <div id="msg" class="error-msg"></div>

      <div class="login-footer">
        pHMonitor — Smart Water Quality Monitoring
      </div>
    </div>
  </div>

  <script>
    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCB4O8j33O3MvstmRPDxaIRA16hBLEWszA",
      authDomain: "phmonitor-c7b10.firebaseapp.com",
      projectId: "phmonitor-c7b10",
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Login function
    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const msgElement = document.getElementById("msg");
      
      // Clear previous error
      msgElement.classList.remove("show");
      
      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          const user = userCredential.user;
          if (user.email === "admin@phmonitor.com") {
            window.location.href = "admin.html";
          } else {
            window.location.href = "dashboard.html";
          }
        })
        .catch((error) => {
          msgElement.innerText = "❌ " + error.message;
          msgElement.classList.add("show");
        });
    }

    // If already logged in, redirect accordingly
    auth.onAuthStateChanged((user) => {
      if (user) {
        if (user.email === "admin@phmonitor.com") {
          window.location.href = "admin.html";
        } else {
          window.location.href = "dashboard.html";
        }
      }
    });

    // Theme toggle functionality
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      
      if (currentTheme === 'dark') {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    // Load saved theme preference
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</body>
</html>
