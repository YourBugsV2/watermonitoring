<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>pHMonitor — Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>
  <!-- Leaflet CSS & JS + Leaflet.heat -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap');

    :root {
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.3);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      --glass-highlight: inset 0 1px 0 0 rgba(255, 255, 255, 0.5);
      --accent-primary: #0369a1;
      --accent-secondary: #0ea5e9;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --bg-start: #f0f9ff;
      --bg-mid: #bae6fd;
      --bg-end: #38bdf8;
      --card-bg: rgba(255, 255, 255, 0.2);
      --card-border: rgba(255, 255, 255, 0.4);
      --card-hover-bg: rgba(255, 255, 255, 0.35);
      --header-bg: rgba(255, 255, 255, 0.1);
      --header-border: rgba(255, 255, 255, 0.25);
      --badge-bg: rgba(14, 165, 233, 0.12);
      --badge-border: rgba(14, 165, 233, 0.25);
      --title-gradient: linear-gradient(135deg, #0c4a6e 0%, #0369a1 40%, #0ea5e9 100%);
      --pending-border: #f59e0b;
      --approved-border: #22c55e;
      --pending-bg: rgba(245, 158, 11, 0.08);
      --approved-bg: rgba(34, 197, 94, 0.08);
      --table-header-bg: rgba(14, 165, 233, 0.12);
      --table-border: rgba(255, 255, 255, 0.25);
      --transition-smooth: 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
      --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      --logout-bg: rgba(220, 38, 38, 0.15);
      --logout-border: rgba(220, 38, 38, 0.3);
      --logout-hover-bg: rgba(220, 38, 38, 0.25);
      --comm-bg: rgba(14, 165, 233, 0.15);
      --comm-border: rgba(14, 165, 233, 0.3);
      --comm-hover-bg: rgba(14, 165, 233, 0.25);
    }

    [data-theme="dark"] {
      --glass-bg: rgba(15, 23, 42, 0.3);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      --glass-highlight: inset 0 1px 0 0 rgba(255, 255, 255, 0.08);
      --accent-primary: #38bdf8;
      --accent-secondary: #7dd3fc;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --bg-start: #0f172a;
      --bg-mid: #1e293b;
      --bg-end: #0c4a6e;
      --card-bg: rgba(15, 23, 42, 0.4);
      --card-border: rgba(255, 255, 255, 0.1);
      --card-hover-bg: rgba(15, 23, 42, 0.55);
      --header-bg: rgba(15, 23, 42, 0.35);
      --header-border: rgba(255, 255, 255, 0.1);
      --badge-bg: rgba(56, 189, 248, 0.15);
      --badge-border: rgba(56, 189, 248, 0.25);
      --title-gradient: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 40%, #bae6fd 100%);
      --pending-border: #fbbf24;
      --approved-border: #4ade80;
      --pending-bg: rgba(251, 191, 36, 0.1);
      --approved-bg: rgba(74, 222, 128, 0.1);
      --table-header-bg: rgba(56, 189, 248, 0.12);
      --table-border: rgba(255, 255, 255, 0.08);
      --logout-bg: rgba(220, 38, 38, 0.2);
      --logout-border: rgba(220, 38, 38, 0.4);
      --logout-hover-bg: rgba(220, 38, 38, 0.3);
      --comm-bg: rgba(56, 189, 248, 0.15);
      --comm-border: rgba(56, 189, 248, 0.25);
      --comm-hover-bg: rgba(56, 189, 248, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-start) 20%, var(--bg-mid) 50%, var(--bg-mid) 80%, var(--bg-end) 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.5s ease, color 0.5s ease;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 5rem;
    }

    .header {
      background: var(--header-bg); backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border-bottom: 1px solid var(--header-border);
      padding: 1rem 2rem; display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 1rem;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05); transition: all 0.5s ease;
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .back-btn {
      background: var(--glass-bg); backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border);
      border-radius: 50%; width: 42px; height: 42px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; text-decoration: none; color: var(--text-primary);
      transition: all var(--transition-smooth); flex-shrink: 0;
    }
    .back-btn:hover { transform: scale(1.1); box-shadow: 0 8px 20px rgba(14,165,233,0.2); }
    .header-title {
      font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em;
      background: var(--title-gradient);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .theme-toggle {
      background: var(--glass-bg); backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border);
      border-radius: 50%; width: 42px; height: 42px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; transition: all var(--transition-smooth); outline: none; color: var(--text-primary);
    }
    .theme-toggle:hover { transform: scale(1.1) rotate(15deg); }
    .theme-toggle .icon-sun, .theme-toggle .icon-moon { transition: all 0.3s ease; position: absolute; }
    .theme-toggle .icon-sun { opacity: 0; transform: scale(0) rotate(-90deg); }
    .theme-toggle .icon-moon { opacity: 1; transform: scale(1) rotate(0deg); }
    [data-theme="dark"] .theme-toggle .icon-sun { opacity: 1; transform: scale(1) rotate(0deg); }
    [data-theme="dark"] .theme-toggle .icon-moon { opacity: 0; transform: scale(0) rotate(90deg); }

    .logout-btn {
      background: var(--logout-bg); backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px); border: 1px solid var(--logout-border);
      color: #ef4444; padding: 0.55rem 1.3rem; border-radius: 100px;
      cursor: pointer; font-weight: 700; font-size: 0.9rem;
      transition: all var(--transition-smooth); letter-spacing: 0.02em; font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .logout-btn:hover { background: var(--logout-hover-bg); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(220,38,38,0.2); }

    .content { max-width: 1300px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }

    .map-toggle-group { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .map-toggle-btn {
      background: var(--glass-bg); backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border);
      color: var(--text-primary); padding: 0.8rem 2rem;
      border-radius: 16px 16px 0 0; font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: all var(--transition-smooth); letter-spacing: 0.02em;
    }
    .map-toggle-btn.active { background: var(--card-bg); border-color: var(--card-border); color: var(--accent-primary); box-shadow: 0 -4px 15px rgba(14,165,233,0.15); }
    .map-toggle-btn:hover:not(.active) { background: var(--card-hover-bg); }

    .map-section { display: none; width: 100%; }
    .map-section.active { display: block; }
    .map-wrapper {
      background: var(--card-bg); backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--card-border); border-radius: 0 0 24px 24px;
      padding: 1.2rem; margin-bottom: 2rem; box-shadow: var(--glass-shadow), var(--glass-highlight);
    }
    #heatmap, #reportMap { width: 100%; height: 420px; border-radius: 16px; border: 2px solid var(--card-border); }

    .section-title {
      font-size: 1.3rem; font-weight: 700; margin: 2rem 0 1rem;
      display: flex; align-items: center; gap: 0.5rem; color: var(--text-primary);
      padding-left: 1rem; border-left: 4px solid var(--accent-secondary);
    }

    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border); border-radius: 20px; padding: 1.5rem;
      text-align: center; box-shadow: var(--glass-shadow), var(--glass-highlight); transition: all var(--transition-smooth);
    }
    .stat-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(14,165,233,0.2); }
    .stat-number { font-size: 2rem; font-weight: 800; background: var(--title-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-label { font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; margin-top: 0.3rem; }

    .report-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.2rem; margin-bottom: 2rem; }
    .report-card {
      background: var(--card-bg); backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--card-border); border-radius: 20px; padding: 1.3rem;
      box-shadow: var(--glass-shadow), var(--glass-highlight);
      transition: all var(--transition-smooth);
      display: flex; flex-direction: column; gap: 0.5rem;
      border-left: 4px solid var(--pending-border);
    }
    .report-card.approved { border-left: 4px solid var(--approved-border); background: var(--approved-bg); }
    .report-card.pending { border-left: 4px solid var(--pending-border); background: var(--pending-bg); }
    .report-card:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(14,165,233,0.18), var(--glass-highlight); }
    .report-card strong { color: var(--accent-primary); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .report-card .card-value { color: var(--text-primary); font-weight: 500; font-size: 0.9rem; word-break: break-word; }
    .report-card .card-email { color: var(--accent-secondary); font-weight: 500; font-size: 0.85rem; word-break: break-all; }

    .status-badge { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 100px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .status-badge.pending { background: rgba(245,158,11,0.15); color: #d97706; border: 1px solid rgba(245,158,11,0.3); }
    .status-badge.approved { background: rgba(34,197,94,0.15); color: #16a34a; border: 1px solid rgba(34,197,94,0.3); }

    .action-btns { display: flex; gap: 0.5rem; margin-top: 0.3rem; flex-wrap: wrap; }

    .btn-approve {
      background: rgba(34,197,94,0.2); border: 1px solid rgba(34,197,94,0.3); color: #16a34a;
      padding: 0.5rem 1rem; border-radius: 10px; cursor: pointer; font-weight: 700;
      font-size: 0.82rem; font-family: 'Plus Jakarta Sans', sans-serif; transition: all var(--transition-smooth);
    }
    .btn-approve:hover { background: rgba(34,197,94,0.35); transform: translateY(-2px); }

    .btn-discard {
      background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); color: #dc2626;
      padding: 0.5rem 1rem; border-radius: 10px; cursor: pointer; font-weight: 700;
      font-size: 0.82rem; font-family: 'Plus Jakarta Sans', sans-serif; transition: all var(--transition-smooth);
    }
    .btn-discard:hover { background: rgba(220,38,38,0.3); transform: translateY(-2px); }

    .btn-email {
      background: var(--comm-bg); border: 1px solid var(--comm-border); color: var(--accent-secondary);
      padding: 0.5rem 1rem; border-radius: 10px; cursor: pointer; font-weight: 700;
      font-size: 0.82rem; font-family: 'Plus Jakarta Sans', sans-serif; transition: all var(--transition-smooth);
      text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem;
    }
    .btn-email:hover { background: var(--comm-hover-bg); transform: translateY(-2px); }

    .empty-state { text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 1rem; }

    /* FAB */
    .fab {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--glass-bg); backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--card-border); border-radius: 50px;
      padding: 1rem 2rem; font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem; font-weight: 700; color: var(--text-primary);
      cursor: pointer; box-shadow: 0 8px 30px rgba(14,165,233,0.25); z-index: 99;
      transition: all var(--transition-bounce); display: flex; align-items: center; gap: 0.5rem; letter-spacing: 0.02em;
    }
    .fab:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 16px 40px rgba(14,165,233,0.35); background: var(--card-hover-bg); }

    /* Communication FAB */
    .fab-comm {
      position: fixed; bottom: 6rem; right: 2rem;
      background: var(--comm-bg); backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--comm-border); border-radius: 50px;
      padding: 0.8rem 1.8rem; font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.9rem; font-weight: 700; color: var(--accent-secondary);
      cursor: pointer; box-shadow: 0 8px 30px rgba(14,165,233,0.2); z-index: 99;
      transition: all var(--transition-bounce); display: flex; align-items: center; gap: 0.5rem;
      text-decoration: none;
    }
    .fab-comm:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 16px 40px rgba(14,165,233,0.3); }

    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border); border-radius: 16px; padding: 1rem 2rem;
      color: var(--text-primary); font-weight: 600; font-size: 0.9rem; z-index: 9999;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
      opacity: 0; transform: translateX(-50%) translateY(20px);
      transition: all 0.3s ease; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .legend { background: var(--card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 10px 14px; border-radius: 12px; border: 1px solid var(--card-border); font-size: 0.8rem; line-height: 1.8; color: var(--text-primary); }
    .legend h4 { margin: 0 0 6px 0; font-weight: 700; font-size: 0.85rem; }
    .legend-item, .marker-legend { display: flex; align-items: center; gap: 6px; }
    .color-box { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--card-border); flex-shrink: 0; }
    .marker-icon-small { width: 14px; height: 14px; border-radius: 50%; border: 2px solid; flex-shrink: 0; }

    @media (max-width: 768px) {
      .header { padding: 0.8rem 1rem; }
      .header-title { font-size: 1.1rem; }
      .content { padding: 1rem; }
      #heatmap, #reportMap { height: 300px; }
      .report-grid { grid-template-columns: 1fr; }
      .map-toggle-btn { padding: 0.6rem 1.2rem; font-size: 0.85rem; }
      .fab { padding: 0.8rem 1.5rem; font-size: 0.9rem; bottom: 1.5rem; right: 1.5rem; }
      .fab-comm { padding: 0.7rem 1.3rem; font-size: 0.8rem; bottom: 5rem; right: 1.5rem; }
    }

    @media (max-width: 480px) {
      .header-title { font-size: 0.95rem; }
      #heatmap, #reportMap { height: 250px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <a href="index.html" class="back-btn">←</a>
      <span class="header-title">🛡️ Admin Panel</span>
    </div>
    <div class="header-right">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <span class="icon-sun">☀️</span><span class="icon-moon">🌙</span>
      </button>
      <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
  </header>

  <div class="toast" id="toast"></div>

  <div class="content">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-number" id="pendingCount">0</div><div class="stat-label">Pending Complaints</div></div>
      <div class="stat-card"><div class="stat-number" id="approvedCount">0</div><div class="stat-label">Approved Complaints</div></div>
      <div class="stat-card"><div class="stat-number" id="reportCount">0</div><div class="stat-label">Total Reports</div></div>
      <div class="stat-card"><div class="stat-number" id="sensorCount">0</div><div class="stat-label">Active Sensors</div></div>
    </div>

    <div class="map-toggle-group">
      <button class="map-toggle-btn active" id="btn-heatmap" onclick="showMap('heatmap')">📊 Sensor Heatmap</button>
      <button class="map-toggle-btn" id="btn-reportmap" onclick="showMap('reportMap')">📍 Reports Map</button>
    </div>

    <div id="heatmap-section" class="map-section active"><div class="map-wrapper"><div id="heatmap"></div></div></div>
    <div id="reportMap-section" class="map-section"><div class="map-wrapper"><div id="reportMap"></div></div></div>

    <div class="section-title">⏳ Pending Complaints</div>
    <div id="pendingComplaints" class="report-grid"><div class="empty-state">No pending complaints</div></div>

    <div class="section-title">✅ Approved Complaints</div>
    <div id="approvedComplaints" class="report-grid"><div class="empty-state">No approved complaints</div></div>
  </div>

  <!-- Communication Center FAB -->
  <a href="communication.html" class="fab-comm">📧 Communication Center</a>

  <!-- Upload FAB -->
  <button class="fab" onclick="window.location.href='upload_check.html'">➕ Upload / Check Data</button>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCB4O8j33O3MvstmRPDxaIRA16hBLEWszA",
      authDomain: "phmonitor-c7b10.firebaseapp.com",
      databaseURL: "https://phmonitor-c7b10-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "phmonitor-c7b10"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    function showToast(message, duration = 3000) {
      const toast = document.getElementById('toast');
      toast.textContent = message; toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    auth.onAuthStateChanged(user => {
      if (!user || user.email !== 'admin@phmonitor.com') window.location.href = 'login.html';
    });
    function logout() { auth.signOut().then(() => window.location.href = 'login.html'); }

    function loadComplaints() {
      db.ref('complaints').on('value', snapshot => {
        const complaints = snapshot.val();
        const pendingDiv = document.getElementById('pendingComplaints');
        const approvedDiv = document.getElementById('approvedComplaints');
        pendingDiv.innerHTML = ''; approvedDiv.innerHTML = '';
        let pendingC = 0, approvedC = 0;

        if (!complaints) {
          pendingDiv.innerHTML = '<div class="empty-state">No pending complaints</div>';
          approvedDiv.innerHTML = '<div class="empty-state">No approved complaints</div>';
          updateStats(0, 0, 0, 0); return;
        }

        Object.entries(complaints).forEach(([key, c]) => {
          const card = document.createElement('div');
          card.className = 'report-card ' + (c.status === 'approved' ? 'approved' : 'pending');
          
          const emailDisplay = c.email 
            ? `<a href="mailto:${c.email}" class="card-email">📧 ${c.email}</a>`
            : '<span class="card-value" style="opacity:0.5;">No email</span>';

          card.innerHTML = `
            <div><strong>Name:</strong> <span class="card-value">${c.name || '-'}</span></div>
            <div><strong>Email:</strong> ${emailDisplay}</div>
            <div><strong>Location:</strong> <span class="card-value">${c.location || '-'}</span></div>
            ${c.lat && c.lng ? `<div><strong>Coords:</strong> <span class="card-value">${c.lat.toFixed(4)}, ${c.lng.toFixed(4)}</span></div>` : ''}
            <div><strong>pH:</strong> <span class="card-value">${c.ph ?? '-'}</span></div>
            <div><strong>TDS:</strong> <span class="card-value">${c.tds ?? '-'}</span></div>
            <div><strong>Issue:</strong> <span class="card-value">${c.issue || '-'}</span></div>
            <div><strong>Description:</strong> <span class="card-value">${c.description || '-'}</span></div>
            <div><span class="status-badge ${c.status === 'approved' ? 'approved' : 'pending'}">${c.status}</span></div>
            ${c.status !== 'approved' ? `
              <div class="action-btns">
                <button class="btn-approve" onclick="approveComplaint('${key}')">✓ Approve</button>
                <button class="btn-discard" onclick="discardComplaint('${key}')">✕ Discard</button>
                ${c.email ? `<a href="mailto:${c.email}" class="btn-email">📧 Email</a>` : ''}
              </div>
            ` : `
              ${c.email ? `<div class="action-btns"><a href="mailto:${c.email}" class="btn-email">📧 Email User</a></div>` : ''}
            `}
          `;

          if (c.status === 'approved') { approvedDiv.appendChild(card); approvedC++; }
          else { pendingDiv.appendChild(card); pendingC++; }
        });

        if (pendingDiv.children.length === 0) pendingDiv.innerHTML = '<div class="empty-state">No pending complaints</div>';
        if (approvedDiv.children.length === 0) approvedDiv.innerHTML = '<div class="empty-state">No approved complaints</div>';

        document.getElementById('pendingCount').textContent = pendingC;
        document.getElementById('approvedCount').textContent = approvedC;
        updateReportCount();
      });
    }

    function approveComplaint(id) {
      db.ref('complaints/' + id).update({ status: 'approved' });
      showToast('✅ Approved! Use Communication Center to send email.');
    }
    function discardComplaint(id) {
      if (confirm('Delete permanently?')) { db.ref('complaints/' + id).remove(); showToast('🗑️ Discarded'); }
    }

    function loadReports() {
      db.ref('reports').on('value', snapshot => {
        document.getElementById('reportCount').textContent = snapshot.val() ? Object.keys(snapshot.val()).length : 0;
      });
    }
    function updateReportCount(count) { if (count !== undefined) document.getElementById('reportCount').textContent = count || 0; }
    function updateStats(p, a, r, s) {
      document.getElementById('pendingCount').textContent = p;
      document.getElementById('approvedCount').textContent = a;
      document.getElementById('reportCount').textContent = r;
      document.getElementById('sensorCount').textContent = s;
    }
    function loadSensorCount() {
      db.ref('sensors').on('value', snapshot => {
        document.getElementById('sensorCount').textContent = snapshot.val() ? Object.keys(snapshot.val()).length : 0;
      });
    }

    function showMap(which) {
      document.getElementById('heatmap-section').classList.remove('active');
      document.getElementById('reportMap-section').classList.remove('active');
      document.getElementById('btn-heatmap').classList.remove('active');
      document.getElementById('btn-reportmap').classList.remove('active');
      if (which === 'heatmap') {
        document.getElementById('heatmap-section').classList.add('active');
        document.getElementById('btn-heatmap').classList.add('active');
        setTimeout(() => { if (heatmapMap) heatmapMap.invalidateSize(); }, 200);
      } else {
        document.getElementById('reportMap-section').classList.add('active');
        document.getElementById('btn-reportmap').classList.add('active');
        setTimeout(() => { if (reportMapInstance) reportMapInstance.invalidateSize(); }, 200);
      }
    }

    const KOLKATA_CENTER = [22.5726, 88.3639];
    const KOLKATA_BOUNDS = [[22.35, 88.15], [22.75, 88.55]];
    let heatmapMap, heatmapLayer, reportMapInstance, reportMarkersLayer, complaintMarkersLayer;

    function initHeatmap() {
      heatmapMap = L.map('heatmap', { center: KOLKATA_CENTER, zoom: 12, minZoom: 10, maxZoom: 17, maxBounds: KOLKATA_BOUNDS, maxBoundsViscosity: 1.0 });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap, &copy; CartoDB', subdomains: 'abcd', maxZoom: 19 }).addTo(heatmapMap);
      L.circleMarker(KOLKATA_CENTER, { radius: 8, fillColor: '#0ea5e9', color: '#0369a1', weight: 2, fillOpacity: 0.7 }).addTo(heatmapMap).bindPopup('<b>Kolkata</b><br>Monitoring Center');
      const heatLegend = L.control({ position: 'bottomright' });
      heatLegend.onAdd = function () {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `<h4>pH Heatmap</h4><div class="legend-item"><div class="color-box" style="background:#ef4444;"></div><span>Poor pH</span></div><div class="legend-item"><div class="color-box" style="background:#eab308;"></div><span>Moderate</span></div><div class="legend-item"><div class="color-box" style="background:#22c55e;"></div><span>Good pH</span></div>`;
        return div;
      };
      heatLegend.addTo(heatmapMap);
      loadHeatmapData();
    }

    function loadHeatmapData() {
      db.ref("sensors").once("value", snapshot => {
        const data = snapshot.val(); if (!data) return;
        const heatArray = [];
        Object.values(data).forEach(sensor => {
          const lat = parseFloat(sensor.latitude), lng = parseFloat(sensor.longitude), pH = parseFloat(sensor.ph);
          if (isNaN(lat) || isNaN(lng)) return;
          let weight;
          if (pH <= 7.5) weight = (pH - 4) / (7.5 - 4);
          else weight = (10 - pH) / (10 - 7.5);
          weight = Math.max(0, Math.min(1, weight));
          heatArray.push([lat, lng, weight]);
        });
        if (heatmapLayer) heatmapMap.removeLayer(heatmapLayer);
        if (heatArray.length === 0) return;
        heatmapLayer = L.heatLayer(heatArray, { radius: 30, blur: 18, maxZoom: 15, max: 1.0, gradient: { 0.0: '#ef4444', 0.5: '#eab308', 1.0: '#22c55e' }, minOpacity: 0.25 }).addTo(heatmapMap);
      });
    }

    function initReportMap() {
      reportMapInstance = L.map('reportMap', { center: KOLKATA_CENTER, zoom: 12, minZoom: 10, maxZoom: 17, maxBounds: KOLKATA_BOUNDS, maxBoundsViscosity: 1.0 });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap, &copy; CartoDB', subdomains: 'abcd', maxZoom: 19 }).addTo(reportMapInstance);
      reportMarkersLayer = L.layerGroup().addTo(reportMapInstance);
      complaintMarkersLayer = L.layerGroup().addTo(reportMapInstance);
      const reportLegend = L.control({ position: 'bottomright' });
      reportLegend.onAdd = function () {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `<h4>Map Markers</h4><div class="marker-legend"><div class="marker-icon-small" style="background:#4CAF50;border-color:#2E7D32;"></div><span>Verified Report</span></div><div class="marker-legend"><div class="marker-icon-small" style="background:#FFC107;border-color:#F57F17;"></div><span>Pending Report</span></div><div class="marker-legend"><div class="marker-icon-small" style="background:#2196F3;border-color:#0D47A1;"></div><span>Approved Complaint</span></div><div class="marker-legend"><div class="marker-icon-small" style="background:#F44336;border-color:#B71C1C;"></div><span>Pending Complaint</span></div>`;
        return div;
      };
      reportLegend.addTo(reportMapInstance);
      loadReportMarkers(); loadComplaintMarkers();
    }

    function loadReportMarkers() {
      db.ref("reports").on("value", snapshot => {
        reportMarkersLayer.clearLayers(); const data = snapshot.val(); if (!data) return;
        Object.values(data).forEach(r => {
          if (!r.lat || !r.lng) return;
          const color = r.status === "verified" ? "#4CAF50" : "#FFC107";
          const border = r.status === "verified" ? "#2E7D32" : "#F57F17";
          L.marker([r.lat, r.lng], { icon: L.divIcon({ html: `<div style="width:18px;height:18px;background:${color};border:3px solid ${border};border-radius:50%;"></div>`, iconSize: [18,18], iconAnchor: [9,9], popupAnchor: [0,-10] }) }).bindPopup(`<b>Report</b><br>${r.comment}<br>Status: ${r.status}`).addTo(reportMarkersLayer);
        });
      });
    }

    function loadComplaintMarkers() {
      db.ref("complaints").on("value", snapshot => {
        complaintMarkersLayer.clearLayers(); const data = snapshot.val(); if (!data) return;
        Object.values(data).forEach(c => {
          if (!c.lat || !c.lng) return;
          const color = c.status === "approved" ? "#2196F3" : "#F44336";
          const border = c.status === "approved" ? "#0D47A1" : "#B71C1C";
          L.marker([c.lat, c.lng], { icon: L.divIcon({ html: `<div style="width:18px;height:18px;background:${color};border:3px solid ${border};border-radius:50%;"></div>`, iconSize: [18,18], iconAnchor: [9,9], popupAnchor: [0,-10] }) }).bindPopup(`<b>${c.name||'Complaint'}</b><br>${c.issue}<br>${c.email?'Email: '+c.email+'<br>':''}Status: ${c.status}`).addTo(complaintMarkersLayer);
        });
      });
    }

    window.onload = () => {
      loadComplaints(); loadReports(); loadSensorCount();
      setTimeout(() => { initHeatmap(); initReportMap(); }, 600);
    };

    window.addEventListener('resize', () => {
      if (heatmapMap) heatmapMap.invalidateSize();
      if (reportMapInstance) reportMapInstance.invalidateSize();
    });

    function toggleTheme() {
      const html = document.documentElement;
      if (html.getAttribute('data-theme') === 'dark') {
        html.removeAttribute('data-theme'); localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark');
      }
    }
    (function() { if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark'); })();
  </script>
</body>
</html>
