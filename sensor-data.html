<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>pHMonitor — Sensor Data Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap');

    :root {
      --glass-bg: rgba(255,255,255,0.15); --glass-border: rgba(255,255,255,0.3);
      --glass-shadow: 0 8px 32px 0 rgba(31,38,135,0.15);
      --glass-highlight: inset 0 1px 0 0 rgba(255,255,255,0.5);
      --accent-primary: #0369a1; --accent-secondary: #0ea5e9;
      --text-primary: #0f172a; --text-secondary: #475569;
      --bg-start: #f0f9ff; --bg-mid: #bae6fd; --bg-end: #38bdf8;
      --card-bg: rgba(255,255,255,0.2); --card-border: rgba(255,255,255,0.4);
      --header-bg: rgba(255,255,255,0.1); --header-border: rgba(255,255,255,0.25);
      --title-gradient: linear-gradient(135deg,#0c4a6e 0%,#0369a1 40%,#0ea5e9 100%);
      --btn: linear-gradient(135deg,#0369a1,#0ea5e9);
      --success: #16a34a; --warning: #d97706; --danger: #dc2626;
      --logout-bg: rgba(220,38,38,0.15); --logout-border: rgba(220,38,38,0.3);
    }

    [data-theme="dark"] {
      --glass-bg: rgba(15,23,42,0.3); --glass-border: rgba(255,255,255,0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0,0,0,0.3);
      --glass-highlight: inset 0 1px 0 0 rgba(255,255,255,0.08);
      --accent-primary: #38bdf8; --accent-secondary: #7dd3fc;
      --text-primary: #e2e8f0; --text-secondary: #94a3b8;
      --bg-start: #0f172a; --bg-mid: #1e293b; --bg-end: #0c4a6e;
      --card-bg: rgba(15,23,42,0.4); --card-border: rgba(255,255,255,0.1);
      --header-bg: rgba(15,23,42,0.35); --header-border: rgba(255,255,255,0.1);
      --title-gradient: linear-gradient(135deg,#7dd3fc 0%,#38bdf8 40%,#bae6fd 100%);
      --btn: linear-gradient(135deg,#0369a1,#38bdf8);
      --logout-bg: rgba(220,38,38,0.2); --logout-border: rgba(220,38,38,0.4);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'Plus Jakarta Sans',sans-serif;
      background:linear-gradient(160deg,var(--bg-start) 0%,var(--bg-start) 20%,var(--bg-mid) 50%,var(--bg-mid) 80%,var(--bg-end) 100%);
      color:var(--text-primary); min-height:100vh;
      transition:background 0.5s,color 0.5s; -webkit-font-smoothing:antialiased;
    }
    [data-theme="dark"] body { background:linear-gradient(160deg,#0f172a,#1e293b,#0c4a6e); }

    .header {
      background:var(--header-bg); backdrop-filter:blur(30px);
      border-bottom:1px solid var(--header-border); padding:1rem 2rem;
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:1rem; position:sticky; top:0; z-index:100;
    }
    .header-left { display:flex; align-items:center; gap:1rem; }
    .back-btn {
      background:var(--glass-bg); border:1px solid var(--glass-border);
      border-radius:50%; width:42px; height:42px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.2rem; text-decoration:none; color:var(--text-primary);
      transition:0.3s; flex-shrink:0;
    }
    .back-btn:hover { transform:scale(1.1); }
    .header-title {
      font-size:1.5rem; font-weight:800;
      background:var(--title-gradient);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .header-right { display:flex; align-items:center; gap:0.8rem; }
    .theme-toggle {
      background:var(--glass-bg); border:1px solid var(--glass-border);
      border-radius:50%; width:42px; height:42px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:1.2rem; color:var(--text-primary); transition:0.3s;
    }
    .theme-toggle:hover { transform:scale(1.1) rotate(15deg); }
    .theme-toggle .icon-sun,.theme-toggle .icon-moon { transition:0.3s; position:absolute; }
    .theme-toggle .icon-sun { opacity:0; transform:scale(0) rotate(-90deg); }
    .theme-toggle .icon-moon { opacity:1; transform:scale(1) rotate(0deg); }
    [data-theme="dark"] .theme-toggle .icon-sun { opacity:1; transform:scale(1) rotate(0deg); }
    [data-theme="dark"] .theme-toggle .icon-moon { opacity:0; transform:scale(0) rotate(90deg); }
    .logout-btn {
      background:var(--logout-bg); border:1px solid var(--logout-border);
      color:#ef4444; padding:0.55rem 1.3rem; border-radius:100px;
      cursor:pointer; font-weight:700; font-size:0.9rem;
      font-family:'Plus Jakarta Sans',sans-serif; transition:0.3s;
    }
    .logout-btn:hover { background:rgba(220,38,38,0.3); transform:translateY(-2px); }

    .content { max-width:1400px; margin:0 auto; padding:1.5rem 2rem 3rem; }

    .stats-row {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:1rem; margin-bottom:1.5rem;
    }
    .stat-card {
      background:var(--card-bg); backdrop-filter:blur(20px);
      border:1px solid var(--card-border); border-radius:18px;
      padding:1.2rem; text-align:center;
      box-shadow:var(--glass-shadow),var(--glass-highlight); transition:0.3s;
    }
    .stat-card:hover { transform:translateY(-3px); }
    .stat-num { font-size:1.6rem; font-weight:800; color:var(--accent-secondary); }
    .stat-label { font-size:0.75rem; color:var(--text-secondary); font-weight:500; margin-top:0.2rem; }

    .controls-row {
      display:flex; gap:0.8rem; flex-wrap:wrap; align-items:center;
      margin-bottom:1.5rem;
    }
    .search-box {
      flex:1; min-width:250px; padding:0.7rem 1rem;
      font-family:'Plus Jakarta Sans',sans-serif; font-size:0.9rem;
      background:var(--card-bg); backdrop-filter:blur(15px);
      border:1px solid var(--card-border); border-radius:12px;
      color:var(--text-primary); outline:none; transition:0.3s;
    }
    .search-box:focus { border-color:var(--accent-secondary); }
    .search-box::placeholder { color:var(--text-secondary); opacity:0.6; }
    .btn {
      padding:0.7rem 1.4rem; font-family:'Plus Jakarta Sans',sans-serif;
      font-size:0.85rem; font-weight:700; color:white;
      background:var(--btn); border:none; border-radius:12px;
      cursor:pointer; transition:0.3s; white-space:nowrap;
    }
    .btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(14,165,233,0.3); }
    .btn-outline { background:transparent; color:var(--accent-primary); border:2px solid var(--accent-secondary); }
    .btn-sm { padding:0.45rem 1rem; font-size:0.78rem; }

    .filter-group { display:flex; gap:0.5rem; flex-wrap:wrap; }
    .filter-badge {
      padding:0.4rem 1rem; border-radius:50px; cursor:pointer;
      font-size:0.78rem; font-weight:600; transition:0.3s;
      background:var(--card-bg); border:1px solid var(--card-border);
      color:var(--text-secondary);
    }
    .filter-badge:hover,.filter-badge.active {
      background:rgba(14,165,233,0.2); border-color:var(--accent-secondary);
      color:var(--accent-primary);
    }

    .table-wrapper {
      background:var(--card-bg); backdrop-filter:blur(24px);
      border:1px solid var(--card-border); border-radius:22px;
      overflow-x:auto; box-shadow:var(--glass-shadow),var(--glass-highlight);
    }
    table { width:100%; border-collapse:collapse; font-size:0.88rem; }
    thead th {
      background:rgba(14,165,233,0.1); padding:1rem 0.8rem;
      text-align:left; font-weight:700; font-size:0.75rem;
      text-transform:uppercase; letter-spacing:0.05em;
      color:var(--accent-primary); border-bottom:2px solid var(--card-border);
      cursor:pointer; white-space:nowrap; user-select:none;
    }
    thead th:hover { background:rgba(14,165,233,0.18); }
    thead th .sort-icon { font-size:0.65rem; margin-left:0.3rem; opacity:0.5; }
    tbody td {
      padding:0.75rem 0.8rem; border-bottom:1px solid var(--card-border);
      color:var(--text-primary);
    }
    tbody tr { transition:0.2s; }
    tbody tr:hover { background:rgba(255,255,255,0.05); }
    tbody tr:last-child td { border-bottom:none; }

    .ph-badge {
      display:inline-block; padding:0.25rem 0.7rem; border-radius:50px;
      font-weight:700; font-size:0.75rem;
    }
    .ph-good { background:rgba(34,197,94,0.15); color:var(--success); }
    .ph-warning { background:rgba(245,158,11,0.15); color:var(--warning); }
    .ph-bad { background:rgba(220,38,38,0.15); color:var(--danger); }
    .ph-unknown { background:rgba(148,163,184,0.15); color:#64748b; }

    .loc-cell { 
      display:flex; align-items:center; gap:0.4rem;
      max-width:280px;
    }
    .loc-cell span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .loc-cell .loc-icon { flex-shrink:0; }

    .geocode-status {
      font-size:0.7rem; color:var(--accent-secondary);
      display:inline-block; margin-left:0.3rem;
    }
    .geocode-loading { animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity:0.4; } 50% { opacity:1; } }

    .pagination {
      display:flex; gap:0.5rem; justify-content:center; align-items:center;
      margin-top:1.5rem; flex-wrap:wrap;
    }
    .page-btn {
      padding:0.5rem 1rem; border-radius:10px; cursor:pointer;
      font-weight:600; font-size:0.82rem; transition:0.3s;
      background:var(--card-bg); border:1px solid var(--card-border);
      color:var(--text-primary); font-family:'Plus Jakarta Sans',sans-serif;
    }
    .page-btn:hover,.page-btn.active { background:rgba(14,165,233,0.2); border-color:var(--accent-secondary); }
    .page-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .page-info { font-size:0.82rem; color:var(--text-secondary); padding:0 1rem; }

    .empty-state { text-align:center; padding:3rem; color:var(--text-secondary); }
    .empty-icon { font-size:3rem; margin-bottom:0.5rem; }

    .toast {
      position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%);
      background:var(--card-bg); backdrop-filter:blur(20px);
      border:1px solid var(--card-border); border-radius:14px;
      padding:0.8rem 1.8rem; font-weight:600; font-size:0.9rem; z-index:9999;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      opacity:0; transform:translateX(-50%) translateY(15px);
      transition:0.3s; pointer-events:none;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    .row-num { color:var(--text-secondary); font-size:0.7rem; min-width:25px; }

    /* Reverse Geocode button */
    .geocode-btn {
      background:var(--card-bg); border:1px dashed var(--card-border);
      color:var(--accent-secondary); padding:0.3rem 0.7rem;
      border-radius:8px; cursor:pointer; font-size:0.7rem;
      font-weight:600; font-family:'Plus Jakarta Sans',sans-serif;
      transition:0.3s; white-space:nowrap;
    }
    .geocode-btn:hover { background:rgba(14,165,233,0.15); border-style:solid; }
    .geocode-btn:disabled { opacity:0.5; cursor:wait; }

    .loc-name { font-weight:500; color:var(--text-primary); }
    .loc-coords { font-size:0.7rem; color:var(--text-secondary); }

    @media (max-width:768px){
      .header{padding:0.8rem 1rem}.header-title{font-size:1.1rem}
      .content{padding:1rem}.stats-row{grid-template-columns:repeat(3,1fr)}
      table{font-size:0.75rem}thead th,tbody td{padding:0.6rem 0.5rem}
      .loc-cell{max-width:180px}
    }
    @media (max-width:480px){
      .stats-row{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <a href="index.html" class="back-btn">←</a>
      <span class="header-title">📡 Sensor Data Viewer</span>
    </div>
    <div class="header-right">
      <button class="theme-toggle" onclick="toggleTheme()">
        <span class="icon-sun">☀️</span><span class="icon-moon">🌙</span>
      </button>
      <button class="logout-btn" id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="toast" id="toast"></div>

  <div class="content">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="totalSensors">0</div><div class="stat-label">Total Sensors</div></div>
      <div class="stat-card"><div class="stat-num" id="goodCount">0</div><div class="stat-label">Good (6.5-8.5)</div></div>
      <div class="stat-card"><div class="stat-num" id="acidicCount">0</div><div class="stat-label">Acidic (&lt;6.5)</div></div>
      <div class="stat-card"><div class="stat-num" id="alkalineCount">0</div><div class="stat-label">Alkaline (&gt;8.5)</div></div>
      <div class="stat-card"><div class="stat-num" id="avgPh">-</div><div class="stat-label">Avg pH</div></div>
      <div class="stat-card"><div class="stat-num" id="avgTds">-</div><div class="stat-label">Avg TDS</div></div>
    </div>

    <!-- Controls -->
    <div class="controls-row">
      <input type="text" class="search-box" id="searchInput" placeholder="Search by location, city, or area name..." oninput="applyFilters()">
      <div class="filter-group">
        <span class="filter-badge active" onclick="setFilter('all')">All</span>
        <span class="filter-badge" onclick="setFilter('good')">Safe</span>
        <span class="filter-badge" onclick="setFilter('acidic')">Acidic</span>
        <span class="filter-badge" onclick="setFilter('alkaline')">Alkaline</span>
      </div>
      <button class="btn btn-sm btn-outline" onclick="exportCSV()">📥 Export CSV</button>
      <button class="btn btn-sm btn-outline" onclick="refreshData()">🔄 Refresh</button>
      <button class="btn btn-sm" onclick="geocodeAll()">🌐 Get All Locations</button>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th style="width:30px;">#</th>
            <th onclick="sortTable('location')">📍 Location <span class="sort-icon">⇅</span></th>
            <th onclick="sortTable('latitude')">Latitude <span class="sort-icon">⇅</span></th>
            <th onclick="sortTable('longitude')">Longitude <span class="sort-icon">⇅</span></th>
            <th onclick="sortTable('ph')">pH <span class="sort-icon">⇅</span></th>
            <th onclick="sortTable('tds')">TDS (ppm) <span class="sort-icon">⇅</span></th>
            <th onclick="sortTable('temperature')">Temp (°C) <span class="sort-icon">⇅</span></th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📡</div>Loading sensor data...</div></td></tr>
        </tbody>
      </table>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCB4O8j33O3MvstmRPDxaIRA16hBLEWszA",
      authDomain: "phmonitor-c7b10.firebaseapp.com",
      databaseURL: "https://phmonitor-c7b10-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "phmonitor-c7b10"
    });
    const db = firebase.database();
    const auth = firebase.auth();

    let allSensors = [];
    let filteredSensors = [];
    let currentSort = { field: 'location', asc: true };
    let currentFilter = 'all';
    let currentPage = 1;
    const ROWS_PER_PAGE = 15;
    let geocodeCache = {}; // Cache for reverse geocoding results

    auth.onAuthStateChanged(user => {
      const logoutBtn = document.getElementById('logoutBtn');
      if (user) logoutBtn.style.display = 'inline-block';
      else logoutBtn.style.display = 'none';
    });
    function logout() { auth.signOut(); }

    function toast(msg, d = 2500) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), d);
    }

    // Load geocode cache from localStorage
    function loadCache() {
      try {
        const cached = localStorage.getItem('phmonitor_geocode_cache');
        if (cached) geocodeCache = JSON.parse(cached);
      } catch(e) {
        geocodeCache = {};
      }
    }

    // Save geocode cache to localStorage
    function saveCache() {
      try {
        localStorage.setItem('phmonitor_geocode_cache', JSON.stringify(geocodeCache));
      } catch(e) {}
    }

    // Reverse geocode using Nominatim
    async function reverseGeocode(lat, lng) {
      const key = `${lat.toFixed(5)},${lng.toFixed(5)}`;
      
      // Check cache first
      if (geocodeCache[key]) return geocodeCache[key];
      
      try {
        const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=16&addressdetails=1`;
        const response = await fetch(url, {
          headers: { 'Accept-Language': 'en' }
        });
        const data = await response.json();
        
        let locationName = '';
        if (data && data.address) {
          const addr = data.address;
          // Build a readable address
          const parts = [];
          if (addr.road) parts.push(addr.road);
          else if (addr.neighbourhood) parts.push(addr.neighbourhood);
          else if (addr.suburb) parts.push(addr.suburb);
          if (addr.city || addr.town || addr.city_district) parts.push(addr.city || addr.town || addr.city_district);
          if (addr.state) parts.push(addr.state);
          
          locationName = parts.join(', ');
        }
        
        if (!locationName && data.display_name) {
          // Take first 2-3 parts of display name
          const parts = data.display_name.split(',').slice(0, 3);
          locationName = parts.join(',').trim();
        }
        
        if (!locationName) locationName = `📍 ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        
        // Cache the result
        geocodeCache[key] = locationName;
        saveCache();
        return locationName;
        
      } catch(e) {
        console.warn('Geocode failed:', e);
        return `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      }
    }

    function getLocationName(sensor, key) {
      // Priority: 1. sensor.location field, 2. geocoded name, 3. coordinates
      if (sensor.location && typeof sensor.location === 'string' && sensor.location.trim().length > 0 && !sensor.location.match(/^-?[A-Za-z0-9_-]{15,}$/)) {
        return sensor.location;
      }
      
      const lat = parseFloat(sensor.latitude);
      const lng = parseFloat(sensor.longitude);
      
      if (!isNaN(lat) && !isNaN(lng)) {
        const cacheKey = `${lat.toFixed(5)},${lng.toFixed(5)}`;
        if (geocodeCache[cacheKey]) {
          return geocodeCache[cacheKey];
        }
        // Return coordinates temporarily, will be updated after geocoding
        return `📍 ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      }
      
      return 'Unknown Location';
    }

    function getPhStatus(ph) {
      if (ph === null || ph === undefined || isNaN(ph)) return 'unknown';
      if (ph < 6.5) return 'bad';
      if (ph > 8.5) return 'warning';
      return 'good';
    }

    function getPhLabel(status) {
      const labels = { good: 'Safe', warning: 'Alkaline', bad: 'Acidic', unknown: 'N/A' };
      return labels[status] || 'N/A';
    }

    function getPhClass(status) {
      return `ph-badge ph-${status}`;
    }

    // Geocode a single sensor
    async function geocodeSensor(index) {
      const sensor = allSensors[index];
      if (!sensor || sensor.latitude === null || sensor.longitude === null) return;
      if (sensor.geocoded) return; // Already done
      
      const lat = sensor.latitude;
      const lng = sensor.longitude;
      const cacheKey = `${lat.toFixed(5)},${lng.toFixed(5)}`;
      
      if (geocodeCache[cacheKey] && sensor.location === `📍 ${lat.toFixed(4)}, ${lng.toFixed(4)}`) {
        sensor.location = geocodeCache[cacheKey];
        sensor.geocoded = true;
      } else if (!geocodeCache[cacheKey]) {
        const name = await reverseGeocode(lat, lng);
        sensor.location = name;
        sensor.geocoded = true;
      }
    }

    // Geocode all sensors
    async function geocodeAll() {
      const uncached = allSensors.filter(s => !s.geocoded && s.latitude !== null && s.longitude !== null);
      
      if (uncached.length === 0) {
        toast('All locations already resolved!');
        return;
      }

      toast(`🌐 Resolving ${uncached.length} locations...`);
      
      // Process in batches of 3 to respect Nominatim rate limit (1 request/sec)
      for (let i = 0; i < uncached.length; i++) {
        const sensor = uncached[i];
        const lat = sensor.latitude;
        const lng = sensor.longitude;
        
        try {
          const name = await reverseGeocode(lat, lng);
          sensor.location = name;
          sensor.geocoded = true;
          
          // Update progress
          if (i % 5 === 0 || i === uncached.length - 1) {
            applyFilters();
          }
        } catch(e) {
          console.warn('Geocode error:', e);
        }
        
        // Rate limiting: wait 1 second between requests
        if (i < uncached.length - 1) {
          await new Promise(resolve => setTimeout(resolve, 1000));
        }
      }
      
      applyFilters();
      saveCache();
      toast(`✅ ${uncached.length} locations resolved!`);
    }

    function loadData() {
      db.ref('sensors').on('value', async snapshot => {
        const data = snapshot.val();
        allSensors = [];
        
        if (data) {
          Object.entries(data).forEach(([key, sensor]) => {
            const ph = sensor.ph !== undefined ? parseFloat(sensor.ph) : null;
            const lat = parseFloat(sensor.latitude) || null;
            const lng = parseFloat(sensor.longitude) || null;
            
            allSensors.push({
              id: key,
              location: getLocationName(sensor, key),
              latitude: lat,
              longitude: lng,
              ph: ph,
              tds: sensor.tds !== undefined ? parseInt(sensor.tds) : null,
              temperature: sensor.temperature !== undefined ? parseFloat(sensor.temperature) : null,
              phStatus: getPhStatus(ph),
              geocoded: false
            });
          });

          // Auto-geocode any sensors that have cached locations
          allSensors.forEach(s => {
            if (s.latitude !== null && s.longitude !== null) {
              const cacheKey = `${s.latitude.toFixed(5)},${s.longitude.toFixed(5)}`;
              if (geocodeCache[cacheKey]) {
                s.location = geocodeCache[cacheKey];
                s.geocoded = true;
              }
            }
          });
        }

        updateStats();
        applyFilters();
      });
    }

    function updateStats() {
      document.getElementById('totalSensors').textContent = allSensors.length;
      
      let good = 0, acidic = 0, alkaline = 0;
      let totalPh = 0, phCount = 0, totalTds = 0, tdsCount = 0;

      allSensors.forEach(s => {
        if (s.phStatus === 'good') good++;
        else if (s.phStatus === 'bad') acidic++;
        else if (s.phStatus === 'warning') alkaline++;
        if (s.ph !== null && !isNaN(s.ph)) { totalPh += s.ph; phCount++; }
        if (s.tds !== null && !isNaN(s.tds)) { totalTds += s.tds; tdsCount++; }
      });

      document.getElementById('goodCount').textContent = good;
      document.getElementById('acidicCount').textContent = acidic;
      document.getElementById('alkalineCount').textContent = alkaline;
      document.getElementById('avgPh').textContent = phCount > 0 ? (totalPh / phCount).toFixed(2) : '-';
      document.getElementById('avgTds').textContent = tdsCount > 0 ? Math.round(totalTds / tdsCount) : '-';
    }

    function applyFilters() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      
      filteredSensors = allSensors.filter(s => {
        if (searchTerm && !s.location.toLowerCase().includes(searchTerm)) return false;
        if (currentFilter === 'good' && s.phStatus !== 'good') return false;
        if (currentFilter === 'acidic' && s.phStatus !== 'bad') return false;
        if (currentFilter === 'alkaline' && s.phStatus !== 'warning') return false;
        return true;
      });

      sortData();
    }

    function sortData() {
      const { field, asc } = currentSort;
      filteredSensors.sort((a, b) => {
        let valA = a[field], valB = b[field];
        if (typeof valA === 'string') valA = valA.toLowerCase();
        if (typeof valB === 'string') valB = valB.toLowerCase();
        if (valA === null || valA === undefined || valA === '') valA = asc ? '\uffff' : '';
        if (valB === null || valB === undefined || valB === '') valB = asc ? '\uffff' : '';
        if (valA < valB) return asc ? -1 : 1;
        if (valA > valB) return asc ? 1 : -1;
        return 0;
      });
      currentPage = 1;
      renderTable();
    }

    function sortTable(field) {
      if (currentSort.field === field) {
        currentSort.asc = !currentSort.asc;
      } else {
        currentSort.field = field;
        currentSort.asc = true;
      }
      sortData();
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-badge').forEach(b => b.classList.remove('active'));
      const idx = { 'all': 0, 'good': 1, 'acidic': 2, 'alkaline': 3 };
      document.querySelectorAll('.filter-badge')[idx[filter]].classList.add('active');
      currentPage = 1;
      applyFilters();
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      const totalPages = Math.ceil(filteredSensors.length / ROWS_PER_PAGE);
      
      if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
      
      const start = (currentPage - 1) * ROWS_PER_PAGE;
      const pageData = filteredSensors.slice(start, start + ROWS_PER_PAGE);

      if (pageData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">🔍</div>No sensor data found</div></td></tr>`;
      } else {
        tbody.innerHTML = pageData.map((s, i) => {
          const isCoords = s.location.startsWith('📍');
          return `
          <tr>
            <td><span class="row-num">${start + i + 1}</span></td>
            <td>
              <div class="loc-cell">
                <span class="loc-icon">📍</span>
                <span title="${s.location}" class="${isCoords ? 'loc-coords' : 'loc-name'}">${s.location}</span>
                ${isCoords ? `<span class="geocode-status geocode-loading">⏳</span>` : ''}
              </div>
            </td>
            <td>${s.latitude !== null ? s.latitude.toFixed(4) : '-'}</td>
            <td>${s.longitude !== null ? s.longitude.toFixed(4) : '-'}</td>
            <td><strong>${s.ph !== null ? s.ph.toFixed(1) : '-'}</strong></td>
            <td>${s.tds !== null ? s.tds + ' ppm' : '-'}</td>
            <td>${s.temperature !== null ? s.temperature.toFixed(1) + '°C' : '-'}</td>
            <td><span class="${getPhClass(s.phStatus)}">${getPhLabel(s.phStatus)}</span></td>
          </tr>
        `}).join('');
      }

      const pag = document.getElementById('pagination');
      if (totalPages <= 1) {
        pag.innerHTML = '';
      } else {
        let pagHTML = `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>`;
        pagHTML += `<span class="page-info">Page ${currentPage} of ${totalPages} (${filteredSensors.length} records)</span>`;
        for (let i = 1; i <= totalPages; i++) {
          if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
            pagHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
          } else if (i === currentPage - 2 || i === currentPage + 2) {
            pagHTML += `<span style="color:var(--text-secondary);">...</span>`;
          }
        }
        pagHTML += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>`;
        pag.innerHTML = pagHTML;
      }
    }

    function goToPage(page) {
      const totalPages = Math.ceil(filteredSensors.length / ROWS_PER_PAGE);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderTable();
      document.querySelector('.table-wrapper').scrollIntoView({ behavior: 'smooth' });
    }

    function exportCSV() {
      if (filteredSensors.length === 0) { toast('No data to export'); return; }
      let csv = 'Location,Latitude,Longitude,pH,TDS (ppm),Temperature (°C),Status\n';
      filteredSensors.forEach(s => {
        csv += `"${s.location}",${s.latitude ?? ''},${s.longitude ?? ''},${s.ph ?? ''},${s.tds ?? ''},${s.temperature ?? ''},${getPhLabel(s.phStatus)}\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `sensor_data_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      toast('✅ CSV exported!');
    }

    function refreshData() {
      toast('🔄 Refreshing...');
      db.ref('sensors').once('value', async snapshot => {
        const data = snapshot.val();
        allSensors = [];
        if (data) {
          Object.entries(data).forEach(([key, sensor]) => {
            const ph = sensor.ph !== undefined ? parseFloat(sensor.ph) : null;
            const lat = parseFloat(sensor.latitude) || null;
            const lng = parseFloat(sensor.longitude) || null;
            allSensors.push({
              id: key, location: getLocationName(sensor, key),
              latitude: lat, longitude: lng, ph: ph,
              tds: sensor.tds !== undefined ? parseInt(sensor.tds) : null,
              temperature: sensor.temperature !== undefined ? parseFloat(sensor.temperature) : null,
              phStatus: getPhStatus(ph), geocoded: false
            });
          });
          // Apply cached names
          allSensors.forEach(s => {
            if (s.latitude !== null && s.longitude !== null) {
              const cacheKey = `${s.latitude.toFixed(5)},${s.longitude.toFixed(5)}`;
              if (geocodeCache[cacheKey]) { s.location = geocodeCache[cacheKey]; s.geocoded = true; }
            }
          });
        }
        updateStats();
        applyFilters();
        toast('✅ Refreshed!');
      });
    }

    function toggleTheme() {
      const html = document.documentElement;
      if (html.getAttribute('data-theme') === 'dark') {
        html.removeAttribute('data-theme'); localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark');
      }
    }

    window.onload = () => {
      if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      loadCache();
      loadData();
    };
  </script>
</body>
</html>
